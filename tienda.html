<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - ¿Quién tiene fuego?</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="main-header full-width">
    <nav class="menu">
      <div class="logo">
        <a href="index.html">
          <img src="logo.svg" alt="Logo ¿Quién tiene fuego?" style="height: 60px; display: block;">
        </a>
      </div>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="tienda.html" class="active">Tienda</a></li>
        <li><a href="about_us.html">About Us</a></li>
        <li><a href="cesta.html">Cesta <span id="cart-count" style="background:#d4af37; color:black; padding:2px 6px; border-radius:50%; font-size:12px; display:none;">0</span></a></li>
        <li id="nav-account-item"></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <img src="IMAGENES/IMAGEN_INDEX.png" alt="Tu estilo, nuestra pasión">
    <div class="hero-text">Nuestra Colección</div>
  </section>

  <section class="best-sellers full-width">
    <h2>Explora nuestros productos</h2>

    <div class="filter-container">
      <label for="filter">Filtrar por categoría:</label>
      <div id="filter-wrapper">
        <select id="filter" onchange="cargarProductos()">
          <option value="all">Todos los productos</option>
          <option value="1">Mecheros</option>
          <option value="2">Papelas</option>
          <option value="3">Filtros</option>
          <option value="4">Ceniceros</option>
          <option value="5">Bandejas</option>
          <option value="6">Grinders</option>
          <option value="7">Cachimbas</option>
          <option value="8">Kits</option>
        </select>
      </div>
    </div>
    
    <div class="grid" id="product-grid">
      <p style="text-align:center; color:#d4af37; grid-column: 1 / -1;">Cargando inventario...</p>
    </div>
  </section>

  <footer class="footer full-width">
    <p>&copy; 2026 ¿Quién tiene fuego? — Todos los derechos reservados.</p>
  </footer>

  <script src="account.js"></script>
  <script src="cart.js"></script>
  <script>
    async function cargarProductos() {
      const filterValue = document.getElementById('filter').value;
      const grid = document.getElementById('product-grid');
      
      grid.innerHTML = '<p style="text-align:center; color:#d4af37; grid-column: 1 / -1;">Cargando inventario...</p>';

      try {
        const respuesta = await fetch(`get_productos.php?categoria=${filterValue}&t=` + new Date().getTime());
        const productos = await respuesta.json();
        grid.innerHTML = '';

        if (productos.error) { grid.innerHTML = `<p style="color:red; text-align:center; grid-column: 1 / -1;">Error: ${productos.error}</p>`; return; }
        if (productos.length === 0) { grid.innerHTML = '<p style="text-align:center; color:#888; grid-column: 1 / -1;">No hay productos.</p>'; return; }

        productos.forEach(prod => {
          const productHTML = `
            <div class="item product-card" data-id="${prod.id}" data-name="${prod.nombre}" data-price="${prod.precio}" data-img="${prod.imagen_url}">
              <div class="item-title">${prod.nombre_categoria || 'Producto'}</div>
              <a href="producto.html?id=${prod.id}">
                <img src="${prod.imagen_url}" alt="${prod.nombre}">
              </a>
              <div class="item-info">
                <a href="producto.html?id=${prod.id}" style="color:#fff; text-decoration:none;">
                  <p style="margin-bottom:8px; font-size:16px; font-weight:bold;">${prod.nombre}</p>
                </a>
                <p class="price">$${parseFloat(prod.precio).toFixed(2)}</p>
                <button class="btn" onclick="addToCart(this)">COMPRAR</button>
              </div>
            </div>
          `;
          grid.innerHTML += productHTML;
        });

      } catch (error) { grid.innerHTML = '<p style="color:red; text-align:center; grid-column: 1 / -1;">Error conectando a BD.</p>'; }
    }
    document.addEventListener('DOMContentLoaded', cargarProductos);
  </script>
</body>
</html>
