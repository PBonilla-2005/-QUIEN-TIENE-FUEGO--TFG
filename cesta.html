<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cesta de Compra - ¿Quién tiene fuego?</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="main-header full-width">
    <nav class="menu">
      <div class="logo">
        <a href="index.html">
          <img src="logo.svg" alt="Logo ¿Quién tiene fuego?" style="height: 60px; display: block;">
        </a>
      </div>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="tienda.html">Tienda</a></li>
        <li><a href="about_us.html">About Us</a></li>
        <li><a href="cesta.html" class="active">Cesta <span id="cart-count" style="background:#d4af37; color:black; padding:2px 6px; border-radius:50%; font-size:12px; display:none;">0</span></a></li>
        <li id="nav-account-item"></li>
      </ul>
    </nav>
  </header>

  <section class="hero" style="height: 250px;">
    <div class="hero-text">Tu Cesta</div>
  </section>

  <section class="full-width cart-section">
    <div class="cart-container">
      
      <div class="cart-items" id="cart-items-container"></div>

      <div id="empty-cart-msg" style="display:none; text-align: center; padding: 50px; border: 1px dashed #333; border-radius: 10px; grid-column: 1 / -1;">
        <h3 style="color: #fff; margin-bottom: 20px;">Tu cesta está vacía</h3>
        <p style="color: #888; margin-bottom: 30px;">Añade algo desde la tienda.</p>
        <a href="tienda.html" class="btn">Ir a la Tienda</a>
      </div>

      <div class="cart-summary" id="cart-summary-box">
        <h2>Resumen</h2>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Envío</span>
          <span>Gratis</span>
        </div>
        <hr style="border-color: #333; margin: 15px 0;">
        <div class="summary-row total">
          <span>Total</span>
          <span id="final-total">$0.00</span>
        </div>
        
        <!-- NUEVO BOTÓN QUE LLEVA A LA PASARELA DE PAGO -->
        <a href="checkout.html" class="btn full-width-btn" style="display:block; box-sizing:border-box;">FINALIZAR COMPRA</a>
        
        <button class="btn full-width-btn" style="background:#333; color:#fff; margin-top:10px;" onclick="clearCart()">VACIAR CESTA</button>
      </div>

    </div>
  </section>

  <footer class="footer full-width">
    <p>&copy; 2026 ¿Quién tiene fuego? — Todos los derechos reservados.</p>
  </footer>

  <script src="account.js"></script>
  <script src="cart.js"></script>
  <script>
    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const container = document.getElementById('cart-items-container');
      const emptyMsg = document.getElementById('empty-cart-msg');
      const summaryBox = document.getElementById('cart-summary-box');

      container.innerHTML = '';

      if (cart.length === 0) {
        emptyMsg.style.display = 'block';
        summaryBox.style.display = 'none';
        return;
      } else {
        emptyMsg.style.display = 'none';
        summaryBox.style.display = 'block';
      }

      cart.forEach((product, index) => {
        const productHTML = `
          <div class="cart-item">
            <img src="${product.img}" alt="${product.name}">
            <div class="cart-item-details">
              <h3>${product.name}</h3>
              <p class="item-price-display">$${product.price.toFixed(2)}</p>
            </div>
            <div class="cart-item-actions">
              <input type="number" value="${product.qty}" min="1" class="qty-input" onchange="updateQty(${index}, this.value)">
              <button class="remove-btn" onclick="removeItem(${index})">Eliminar</button>
            </div>
          </div>
        `;
        container.innerHTML += productHTML;
      });

      updateTotals(cart);
    }

    function updateTotals(cart) {
      let total = 0;
      cart.forEach(item => { total += item.price * item.qty; });
      document.getElementById('subtotal').innerText = '$' + total.toFixed(2);
      document.getElementById('final-total').innerText = '$' + total.toFixed(2);
    }

    function updateQty(index, newQty) {
      let cart = JSON.parse(localStorage.getItem('cart'));
      if (newQty < 1) newQty = 1;
      cart[index].qty = parseInt(newQty);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateTotals(cart);
      updateCartCount();
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('cart'));
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
      updateCartCount();
    }

    function clearCart() {
      localStorage.removeItem('cart');
      loadCart();
      updateCartCount();
    }

    window.addEventListener('load', loadCart);
  </script>
</body>
</html>
