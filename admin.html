<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración - ¿Quién tiene fuego?</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d4af37; padding-bottom: 20px; margin-bottom: 30px; }
    .admin-tabs { display: flex; gap: 20px; margin-bottom: 30px; }
    .admin-tab { padding: 12px 25px; background: #1a1a1a; color: #888; border: 1px solid #333; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .admin-tab.active { background: #d4af37; color: #000; border-color: #d4af37; }
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
    .admin-table { width: 100%; border-collapse: collapse; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
    .admin-table th, .admin-table td { padding: 15px; text-align: left; border-bottom: 1px solid #333; color: #fff; }
    .admin-table th { background: #111; color: #d4af37; font-weight: bold; text-transform: uppercase; font-size: 13px; }
    .admin-table tr:hover { background: #222; }
    .add-form { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: #111; padding: 25px; border-radius: 8px; margin-bottom: 30px; border: 1px dashed #d4af37; }
    .add-form input, .add-form select, .add-form textarea { background: #0a0a0a; border: 1px solid #333; padding: 10px; color: #fff; border-radius: 5px; width: 100%; box-sizing: border-box; font-family:inherit;}
    .add-form input:focus, .add-form select:focus, .add-form textarea:focus { border-color: #d4af37; outline: none; }
    .btn-danger { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    .btn-danger:hover { background: #ff4d4d; color: #fff; }
  </style>
</head>
<body>

  <header class="main-header full-width">
    <nav class="menu">
      <div class="logo">
        <a href="index.html">
          <img src="logo.svg" alt="Logo" style="height: 60px; display: block;">
        </a>
      </div>
      <ul>
        <li><a href="index.html">Ir a la Tienda</a></li>
        <li id="nav-account-item"></li>
      </ul>
    </nav>
  </header>

  <div class="admin-container">
    <div class="admin-header">
      <h1 style="color: #d4af37; margin: 0;">⚙️ Panel de Control</h1>
      <p style="color: #888;">Modo Administrador</p>
    </div>

    <div class="admin-tabs">
      <div class="admin-tab active" onclick="switchAdminTab('pedidos', this)">🛒 Todos los Pedidos</div>
      <div class="admin-tab" onclick="switchAdminTab('productos', this)">📦 Gestión de Productos</div>
    </div>

    <div id="panel-pedidos" class="admin-panel active">
      <table class="admin-table">
        <thead>
          <tr><th>ID Pedido</th><th>Cliente</th><th>Email</th><th>Fecha</th><th>Total</th><th>Estado</th></tr>
        </thead>
        <tbody id="admin-orders-list"><tr><td colspan="6" style="text-align: center;">Cargando...</td></tr></tbody>
      </table>
    </div>

    <div id="panel-productos" class="admin-panel">
      <form class="add-form" id="form-add-product" onsubmit="crearProducto(event)">
        <h3 style="grid-column: 1 / -1; color: #d4af37; margin-top: 0;">➕ Añadir Nuevo Producto</h3>
        
        <div><label style="color:#888; font-size:12px;">Nombre</label><input type="text" id="add-nombre" required></div>
        <div><label style="color:#888; font-size:12px;">Precio ($)</label><input type="number" step="0.01" id="add-precio" required></div>
        <div>
          <label style="color:#888; font-size:12px;">Categoría</label>
          <select id="add-cat" required>
            <option value="1">Mecheros</option><option value="2">Papelas</option>
            <option value="3">Filtros</option><option value="4">Ceniceros</option>
            <option value="5">Bandejas</option><option value="6">Grinders</option>
            <option value="7">Cachimbas</option><option value="8">Kits</option>
          </select>
        </div>
        
        <div style="grid-column: 1 / -1;">
          <label style="color:#888; font-size:12px;">Descripción del Producto</label>
          <textarea id="add-desc" rows="3" placeholder="Escribe aquí los detalles del producto..."></textarea>
        </div>
        
        <div style="grid-column: 1 / 3;"><label style="color:#888; font-size:12px;">URL Imagen</label><input type="url" id="add-img" value="https://via.placeholder.com/150" required></div>
        <div><label style="color:#888; font-size:12px;">Stock</label><input type="number" id="add-stock" value="100" required></div>
        
        <button type="submit" class="btn" style="grid-column: 1 / -1; margin-top: 10px;">GUARDAR PRODUCTO</button>
      </form>

      <table class="admin-table">
        <thead>
          <tr><th>ID</th><th>Foto</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr>
        </thead>
        <tbody id="admin-products-list"><tr><td colspan="6" style="text-align: center;">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>

  <script src="account.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const currentUser = JSON.parse(localStorage.getItem('currentUser'));
      if (!currentUser || currentUser.rol !== 'admin') { alert('Acceso denegado.'); window.location.href = 'index.html'; return; }
      cargarPedidos(); cargarProductos();
    });

    function switchAdminTab(panelId, btn) {
      document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-' + panelId).classList.add('active'); btn.classList.add('active');
    }

    async function cargarPedidos() {
      const tbody = document.getElementById('admin-orders-list');
      try {
        const res = await fetch('get_todos_pedidos.php'); const pedidos = await res.json();
        tbody.innerHTML = '';
        pedidos.forEach(p => {
          tbody.innerHTML += `<tr><td>#${p.id}</td><td>${p.nombre}</td><td>${p.email}</td><td>${p.fecha_pedido}</td><td style="color:#d4af37;">$${parseFloat(p.total).toFixed(2)}</td><td>${p.estado}</td></tr>`;
        });
      } catch (e) { tbody.innerHTML = '<tr><td colspan="6">Error de conexión.</td></tr>'; }
    }

    async function cargarProductos() {
      const tbody = document.getElementById('admin-products-list');
      try {
        const res = await fetch('get_productos.php?categoria=all&t=' + new Date().getTime()); const productos = await res.json();
        tbody.innerHTML = '';
        productos.forEach(p => {
          const stockColor = p.stock < 20 ? '#ff4d4d' : '#fff';
          tbody.innerHTML += `<tr><td>${p.id}</td><td><img src="${p.imagen_url}" style="width:40px;height:40px;object-fit:cover;"></td><td>${p.nombre}</td><td>$${parseFloat(p.precio).toFixed(2)}</td><td style="color:${stockColor};">${p.stock !== null ? p.stock : 0} uds.</td><td><button class="btn-danger" onclick="borrarProducto(${p.id})">Borrar</button></td></tr>`;
        });
      } catch (e) { tbody.innerHTML = '<tr><td colspan="6">Error cargando productos.</td></tr>'; }
    }

    async function crearProducto(e) {
      e.preventDefault();
      const payload = {
        accion: 'crear',
        nombre: document.getElementById('add-nombre').value,
        precio: document.getElementById('add-precio').value,
        categoria_id: document.getElementById('add-cat').value,
        imagen_url: document.getElementById('add-img').value,
        stock: document.getElementById('add-stock').value,
        descripcion: document.getElementById('add-desc').value // Se manda la descripción nueva
      };
      try {
        const res = await fetch('crud_productos.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if(data.success) { alert('Añadido!'); document.getElementById('form-add-product').reset(); cargarProductos(); } 
        else { alert('Error: ' + data.error); }
      } catch (e) { alert('Error de conexión.'); }
    }

    async function borrarProducto(id) {
      if(!confirm('¿Seguro que quieres borrarlo?')) return;
      try {
        const res = await fetch('crud_productos.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ accion: 'borrar', id: id }) });
        const data = await res.json();
        if(data.success) { cargarProductos(); } else { alert('Error: ' + data.error); }
      } catch (e) { alert('Error de conexión.'); }
    }
  </script>
</body>
</html>
